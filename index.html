<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Company-wise Questions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Minimal Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="sprint-icon"><img src = "resources/icon.png" height="30px" width="30px"></div>
            <span class="brand-text">Powered by Sprint</span>
        </div>
    </nav>

    <main class="container">
        <!-- Minimal Hero -->
        <section class="hero">
            <h1>Search Company Interview Questions</h1>
            <p>Access high-probability questions categorized across popular technology companies.</p>
        </section>

        <!-- Search Bar with pill rounding -->
        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="search-input" placeholder="Search Google, Apple, Amazon, Meta..." autocomplete="off">
            </div>
            <div class="suggestions-dropdown hidden" id="suggestions"></div>
        </div>

        <!-- Dynamic Output Board -->
        <div id="company-board" class="hidden">
            <div class="board-header">
                <div>
                    <h2 id="company-title" class="company-title">Company Name</h2>
                    <span id="question-count" class="question-count">0 questions</span>
                </div>

                <!-- Difficulty Filter Controls (Pill Rounded) -->
                <div class="filter-controls">
                    <span class="filter-label">Difficulty:</span>
                    <div class="filter-pills">
                        <button class="filter-pill active" data-difficulty="All">All</button>
                        <button class="filter-pill" data-difficulty="Easy">Easy</button>
                        <button class="filter-pill" data-difficulty="Medium">Medium</button>
                        <button class="filter-pill" data-difficulty="Hard">Hard</button>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader-container hidden">
                <div class="spinner"></div>
                <span>Loading problems...</span>
            </div>

            <!-- Question Table -->
            <div class="table-container" id="table-wrapper">
                <table class="questions-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="id">ID <span class="sort-indicator"></span></th>
                            <th class="sortable" data-sort="title">Title <span class="sort-indicator"></span></th>
                            <th class="sortable" data-sort="difficulty">Difficulty <span class="sort-indicator"></span></th>
                            <th>Acceptance</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Initial Blank State -->
        <div id="blank-state" class="blank-card">
            <p> Search for a company in the input above to begin exploring problems.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
